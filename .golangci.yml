version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/goceleris/celeris

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - revive
    - ineffassign
    - unused
    - misspell
    - unconvert
    - unparam
    - prealloc
    - nolintlint
  settings:
    nolintlint:
      require-explanation: true
      require-specific: true
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - unparam
      - path: _test\.go
        linters:
          - prealloc
      - path: _test\.go
        linters:
          - revive
        text: "dot-imports"
      - path: _test\.go
        linters:
          - revive
        text: "unused-parameter"
      - path: _test\.go
        linters:
          - revive
        text: "empty-block"
      - path: _test\.go
        linters:
          - staticcheck
        text: "SA9003"
      - path: _test\.go
        linters:
          - staticcheck
        text: "SA2001"
      - path: _test\.go
        linters:
          - staticcheck
        text: "SA4024"
      - path: driver/redis/(cluster|sentinel)\.go
        linters:
          - revive
        text: "exported: exported method"
      - path: driver/redis/errors\.go
        linters:
          - revive
        text: "stutters"
      - path: driver/memcached/errors\.go
        linters:
          - revive
        text: "stutters"
      - path: middleware/debug/
        linters:
          - revive
        text: "var-naming"
      - path: middleware/metrics/
        linters:
          - revive
        text: "var-naming"
      - path: middleware/pprof/
        linters:
          - revive
        text: "var-naming"
