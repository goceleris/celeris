name: Smoke Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  smoke-bench:
    name: Smoke (${{ matrix.arch }} / ${{ matrix.tier }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    env:
      CELERIS_MAX_IOURING_TIER: ${{ matrix.tier }}
    strategy:
      fail-fast: false
      matrix:
        # Full tier × arch matrix. GHA runners all have 6.x kernels, so we
        # use CELERIS_MAX_IOURING_TIER to force each tier's code path:
        #
        #   optional  — kernel 6.0+ (SQPOLL, SEND_ZC, SINGLE_ISSUER)
        #   high      — kernel 5.19+ (multishot accept, provided buffers, fixed files)
        #   mid       — kernel 5.13+ (COOP_TASKRUN)
        #   base      — kernel 5.10+ (single-shot accept/recv)
        #   none      — io_uring disabled (epoll + std only)
        arch: [x86_64, arm64]
        tier: [optional, high, mid, base, none]
        include:
          # Map arch to GitHub Actions runner labels
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: System info
        run: |
          echo "## System" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Kernel | $(uname -r) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Arch | $(uname -m) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| CPUs | $(nproc) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Max io_uring tier | $CELERIS_MAX_IOURING_TIER |" >> "$GITHUB_STEP_SUMMARY"

      - name: Build smoke binaries
        run: |
          go build -o /tmp/smoke-loadtest ./test/loadtest/
          go build -o /tmp/smoke-fullstack ./test/loadtest/fullstack/

      - name: "Smoke: engine loadtest"
        run: |
          /tmp/smoke-loadtest 2>&1 | tee /tmp/loadtest.txt || true
          SUMMARY=$(grep -E '^[0-9]+/[0-9]+ passed' /tmp/loadtest.txt || echo "0/0 passed, 0 failed, 0 skipped")
          echo "Engine loadtest: $SUMMARY"

          TOTAL=$(echo "$SUMMARY" | grep -oP '(?<=/)\d+' | head -1 || echo 0)
          FAILED=$(echo "$SUMMARY" | grep -oP '\d+(?= failed)' || echo 0)

          echo "## Engine Loadtest (${{ matrix.tier }} tier)" >> "$GITHUB_STEP_SUMMARY"
          echo "$SUMMARY" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "<details><summary>Full output</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/loadtest.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"

          # Fail if majority of tests failed (catastrophic regression).
          if [ "$TOTAL" -gt 0 ] && [ "$FAILED" -gt $((TOTAL / 2)) ]; then
            echo "::error::Catastrophic regression: $FAILED/$TOTAL configs failed"
            exit 1
          fi

      - name: "Smoke: fullstack loadtest"
        run: |
          /tmp/smoke-fullstack 2>&1 | tee /tmp/fullstack.txt || true
          SUMMARY=$(grep -E '^[0-9]+/[0-9]+ passed' /tmp/fullstack.txt || echo "0/0 passed, 0 failed, 0 skipped")
          echo "Fullstack loadtest: $SUMMARY"

          TOTAL=$(echo "$SUMMARY" | grep -oP '(?<=/)\d+' | head -1 || echo 0)
          FAILED=$(echo "$SUMMARY" | grep -oP '\d+(?= failed)' || echo 0)

          echo "## Fullstack Loadtest (${{ matrix.tier }} tier)" >> "$GITHUB_STEP_SUMMARY"
          echo "$SUMMARY" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "<details><summary>Full output</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/fullstack.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"

          if [ "$TOTAL" -gt 0 ] && [ "$FAILED" -gt $((TOTAL / 2)) ]; then
            echo "::error::Catastrophic regression: $FAILED/$TOTAL configs failed"
            exit 1
          fi
