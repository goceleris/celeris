name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Unit and engine tests
        run: >-
          go test -race -count=1 -timeout=120s
          $(go list ./... | grep -v /test/)

  conformance:
    name: Conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Conformance matrix (engines × protocols)
        run: go test -v -race -count=1 -timeout=120s ./test/conformance/...

  spec:
    name: Spec Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Install h2spec
        run: go run mage.go tools
      - name: H1 spec (RFC 9112)
        run: >-
          go test -v -race -count=1 -timeout=120s
          -run TestH1Spec ./test/spec/...
      - name: H2 spec (h2spec strict, iouring + epoll)
        run: >-
          go test -v -count=1 -timeout=120s
          -run "TestH2SpecFull/(iouring|epoll)" ./test/spec/...
      - name: Integration (parallel requests, streams, protocol detection)
        run: >-
          go test -v -race -count=1 -timeout=120s
          -run "TestHTTP1Parallel|TestH2CParallel|TestAutoProtocolDetection|TestH2CMultipleStreams|TestHTTP1LargeBodyParallel"
          ./test/spec/...

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: go run mage.go build

  bench:
    name: Bench
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: go run mage.go bench
