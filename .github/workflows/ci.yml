name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

# Flaky jobs (`test`, `spec`, `integration`, `bench`) were removed
# 2026-04-28. They timed out unpredictably on shared GitHub Actions
# runners — race-detector + Azure-runner-cold-start blew the
# TestAdaptiveH2DialNoRSTRace bind deadline; h2spec hit timing limits
# under -race; integration's fakePG harness wedged on extended-protocol
# queries. Real correctness validation lives in the strict matrix
# (mage matrixBenchStrict on msr1, race + checkptr + fail-fast) and the
# spec/integration tests run locally before merge.

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Lint root module
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9
      - name: Lint middleware/compress
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9
          working-directory: middleware/compress
      - name: Lint middleware/metrics
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9
          working-directory: middleware/metrics
      - name: Lint middleware/otel
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9
          working-directory: middleware/otel
      - name: Lint middleware/protobuf
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9
          working-directory: middleware/protobuf

  unit:
    name: Unit (root + middleware sub-modules)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      # Excludes ./test/... to keep this job deterministic — those
      # suites (integration, spec, perfmatrix, sustainedload) are
      # timing-sensitive on shared GitHub Actions runners and live in
      # the strict matrix on msr1 instead.
      #
      # Excludes ./adaptive/... because TestAdaptiveH2DialNoRSTRace and
      # TestAdaptiveScaler_H2DialNoRSTRace burst 32 parallel H2 dials
      # against a freshly-spun adaptive engine, which intermittently
      # times out on cold runner instances under -race. The same code
      # paths run race-clean on msr1 + Multipass.
      - name: Root module — race tests (excluding test/ and adaptive/)
        run: >-
          go test -race -count=1 -timeout=300s
          $(go list ./... | grep -vE '/test/|/adaptive($|/)')
      - name: middleware/compress
        run: go test -race -count=1 -timeout=120s ./...
        working-directory: middleware/compress
      - name: middleware/metrics
        run: go test -race -count=1 -timeout=120s ./...
        working-directory: middleware/metrics
      - name: middleware/otel
        run: go test -race -count=1 -timeout=120s ./...
        working-directory: middleware/otel
      - name: middleware/protobuf
        run: go test -race -count=1 -timeout=120s ./...
        working-directory: middleware/protobuf

  conformance:
    name: Conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Conformance matrix (engines × protocols)
        run: go test -v -race -count=1 -timeout=120s ./test/conformance/...

  driver-conformance:
    name: Driver Conformance (Postgres + Redis)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: celeris
          POSTGRES_USER: celeris
          POSTGRES_DB: celeristest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U celeris -d celeristest"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7.2
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CELERIS_PG_DSN: postgres://celeris:celeris@127.0.0.1:5432/celeristest?sslmode=disable
      CELERIS_REDIS_ADDR: 127.0.0.1:6379
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Postgres conformance
        run: >-
          go test -tags postgres -race -count=1 -timeout=300s
          ./test/conformance/postgres/...
      - name: Redis conformance
        run: >-
          go test -tags redis -race -count=1 -timeout=300s
          ./test/conformance/redis/...

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Build root module
        run: go build ./...
      - name: Build middleware/compress
        run: go build ./...
        working-directory: middleware/compress
      - name: Build middleware/metrics
        run: go build ./...
        working-directory: middleware/metrics
      - name: Build middleware/otel
        run: go build ./...
        working-directory: middleware/otel
      - name: Build middleware/protobuf
        run: go build ./...
        working-directory: middleware/protobuf

  vulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Root module
        run: govulncheck ./...
      - name: middleware/compress
        run: govulncheck ./...
        working-directory: middleware/compress
      - name: middleware/metrics
        run: govulncheck ./...
        working-directory: middleware/metrics
      - name: middleware/otel
        run: govulncheck ./...
        working-directory: middleware/otel
      - name: middleware/protobuf
        run: govulncheck ./...
        working-directory: middleware/protobuf
