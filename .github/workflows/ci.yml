name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Lint root module
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9
      - name: Lint middleware/compress
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9
          working-directory: middleware/compress
      - name: Lint middleware/metrics
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9
          working-directory: middleware/metrics
      - name: Lint middleware/otel
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9
          working-directory: middleware/otel
      - name: Lint middleware/protobuf
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9
          working-directory: middleware/protobuf

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Root module tests (core + middleware)
        run: >-
          go test -race -count=1 -timeout=120s
          $(go list ./... | grep -v /test/)
      - name: Sub-module tests (middleware/compress)
        run: go test -race -count=1 -timeout=60s ./...
        working-directory: middleware/compress
      - name: Sub-module tests (middleware/metrics)
        run: go test -race -count=1 -timeout=60s ./...
        working-directory: middleware/metrics
      - name: Sub-module tests (middleware/otel)
        run: go test -race -count=1 -timeout=60s ./...
        working-directory: middleware/otel
      - name: Sub-module tests (middleware/protobuf)
        run: go test -race -count=1 -timeout=60s ./...
        working-directory: middleware/protobuf

  conformance:
    name: Conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Conformance matrix (engines × protocols)
        run: go test -v -race -count=1 -timeout=120s ./test/conformance/...

  driver-conformance:
    name: Driver Conformance (Postgres + Redis)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: celeris
          POSTGRES_USER: celeris
          POSTGRES_DB: celeristest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U celeris -d celeristest"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7.2
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CELERIS_PG_DSN: postgres://celeris:celeris@127.0.0.1:5432/celeristest?sslmode=disable
      CELERIS_REDIS_ADDR: 127.0.0.1:6379
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Postgres conformance
        run: >-
          go test -tags postgres -race -count=1 -timeout=300s
          ./test/conformance/postgres/...
      - name: Redis conformance
        run: >-
          go test -tags redis -race -count=1 -timeout=300s
          ./test/conformance/redis/...

  spec:
    name: Spec Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Install mage and h2spec
        run: go install github.com/magefile/mage@latest && mage tools
      - name: H1 spec (RFC 9112)
        run: >-
          go test -v -race -count=1 -timeout=120s
          -run TestH1Spec ./test/spec/...
      - name: H2 spec (h2spec strict, iouring + epoll)
        run: >-
          go test -v -count=1 -timeout=120s
          -run "TestH2SpecFull/(iouring|epoll)" ./test/spec/...
      - name: Integration (parallel requests, streams, protocol detection)
        run: >-
          go test -v -race -count=1 -timeout=120s
          -run "TestHTTP1Parallel|TestH2CParallel|TestAutoProtocolDetection|TestH2CMultipleStreams|TestHTTP1LargeBodyParallel"
          ./test/spec/...

  integration:
    name: Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Integration tests
        run: go test -v -race -count=1 -timeout=120s ./test/integration/...
      - name: Integration tests (constrained)
        run: taskset -c 0 go test -v -count=1 -timeout=120s -run TestAdaptiveAutoSingleWorker ./test/integration/...

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Build root module
        run: go build ./...
      - name: Build middleware/compress
        run: go build ./...
        working-directory: middleware/compress
      - name: Build middleware/metrics
        run: go build ./...
        working-directory: middleware/metrics
      - name: Build middleware/otel
        run: go build ./...
        working-directory: middleware/otel
      - name: Build middleware/protobuf
        run: go build ./...
        working-directory: middleware/protobuf

  vulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Root module
        run: govulncheck ./...
      - name: middleware/compress
        run: govulncheck ./...
        working-directory: middleware/compress
      - name: middleware/metrics
        run: govulncheck ./...
        working-directory: middleware/metrics
      - name: middleware/otel
        run: govulncheck ./...
        working-directory: middleware/otel
      - name: middleware/protobuf
        run: govulncheck ./...
        working-directory: middleware/protobuf

  bench:
    name: Bench
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Install mage
        run: go install github.com/magefile/mage@latest
      - run: mage bench
