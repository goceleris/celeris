# docker-compose.cluster.yml — disposable 6-node Redis Cluster (3 masters +
# 3 replicas) for conformance tests. Uses host networking so CLUSTER SLOTS
# replies advertise 127.0.0.1 addresses that are reachable from the test
# binary running on the same host. Ports 7000-7005 (client) and
# 17000-17005 (cluster bus).
#
# Start:
#   docker compose -f test/conformance/redis/docker-compose.cluster.yml up -d
#   # wait for the cluster-init container to exit 0
#
# Point the conformance tests at it:
#   export CELERIS_REDIS_CLUSTER_ADDRS=127.0.0.1:7000,127.0.0.1:7001,127.0.0.1:7002
#   go test -tags redis_cluster -race ./test/conformance/redis/...
#
# Tear down:
#   docker compose -f test/conformance/redis/docker-compose.cluster.yml down -v

x-redis-node: &redis-node
  image: ${REDIS_IMAGE:-redis:7.2}
  network_mode: host
  restart: unless-stopped

services:
  redis-cluster-0:
    <<: *redis-node
    container_name: celeris-cluster-0
    command: [redis-server, --port, "7000", --cluster-enabled, "yes", --cluster-config-file, /data/nodes.conf, --cluster-node-timeout, "5000", --cluster-announce-ip, 127.0.0.1, --cluster-announce-port, "7000", --cluster-announce-bus-port, "17000", --appendonly, "no", --save, "", --protected-mode, "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7000", "ping"]
      interval: 2s
      timeout: 2s
      retries: 15

  redis-cluster-1:
    <<: *redis-node
    container_name: celeris-cluster-1
    command: [redis-server, --port, "7001", --cluster-enabled, "yes", --cluster-config-file, /data/nodes.conf, --cluster-node-timeout, "5000", --cluster-announce-ip, 127.0.0.1, --cluster-announce-port, "7001", --cluster-announce-bus-port, "17001", --appendonly, "no", --save, "", --protected-mode, "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7001", "ping"]
      interval: 2s
      timeout: 2s
      retries: 15

  redis-cluster-2:
    <<: *redis-node
    container_name: celeris-cluster-2
    command: [redis-server, --port, "7002", --cluster-enabled, "yes", --cluster-config-file, /data/nodes.conf, --cluster-node-timeout, "5000", --cluster-announce-ip, 127.0.0.1, --cluster-announce-port, "7002", --cluster-announce-bus-port, "17002", --appendonly, "no", --save, "", --protected-mode, "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7002", "ping"]
      interval: 2s
      timeout: 2s
      retries: 15

  redis-cluster-3:
    <<: *redis-node
    container_name: celeris-cluster-3
    command: [redis-server, --port, "7003", --cluster-enabled, "yes", --cluster-config-file, /data/nodes.conf, --cluster-node-timeout, "5000", --cluster-announce-ip, 127.0.0.1, --cluster-announce-port, "7003", --cluster-announce-bus-port, "17003", --appendonly, "no", --save, "", --protected-mode, "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7003", "ping"]
      interval: 2s
      timeout: 2s
      retries: 15

  redis-cluster-4:
    <<: *redis-node
    container_name: celeris-cluster-4
    command: [redis-server, --port, "7004", --cluster-enabled, "yes", --cluster-config-file, /data/nodes.conf, --cluster-node-timeout, "5000", --cluster-announce-ip, 127.0.0.1, --cluster-announce-port, "7004", --cluster-announce-bus-port, "17004", --appendonly, "no", --save, "", --protected-mode, "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7004", "ping"]
      interval: 2s
      timeout: 2s
      retries: 15

  redis-cluster-5:
    <<: *redis-node
    container_name: celeris-cluster-5
    command: [redis-server, --port, "7005", --cluster-enabled, "yes", --cluster-config-file, /data/nodes.conf, --cluster-node-timeout, "5000", --cluster-announce-ip, 127.0.0.1, --cluster-announce-port, "7005", --cluster-announce-bus-port, "17005", --appendonly, "no", --save, "", --protected-mode, "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7005", "ping"]
      interval: 2s
      timeout: 2s
      retries: 15

  cluster-init:
    image: ${REDIS_IMAGE:-redis:7.2}
    network_mode: host
    container_name: celeris-cluster-init
    depends_on:
      redis-cluster-0: {condition: service_healthy}
      redis-cluster-1: {condition: service_healthy}
      redis-cluster-2: {condition: service_healthy}
      redis-cluster-3: {condition: service_healthy}
      redis-cluster-4: {condition: service_healthy}
      redis-cluster-5: {condition: service_healthy}
    entrypoint:
      - sh
      - -ec
      - |
        echo "yes" | redis-cli --cluster create \
          127.0.0.1:7000 127.0.0.1:7001 127.0.0.1:7002 \
          127.0.0.1:7003 127.0.0.1:7004 127.0.0.1:7005 \
          --cluster-replicas 1
    restart: "no"
