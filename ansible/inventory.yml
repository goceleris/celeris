---
# Cluster inventory for celeris benchmarking.
#
# Each host's `ansible_host` is the LAN IP pinned via DHCP reservation on
# the BD4 router. Tailscale fallback is automatic — when a host is offline
# from the LAN side, ansible can also reach it via its tailnet name.
#
# `arch` is the GOARCH for cross-compiling binaries on the developer Mac.
all:
  vars:
    ansible_user: mini
    ansible_ssh_common_args: '-o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=accept-new'
    # All transient bench state lives under /tmp so a reboot wipes it.
    bench_root: /tmp/celeris-bench
    results_root: /tmp/celeris-results
    manifest_path: /tmp/celeris-bench-manifest.json
  children:
    bench_targets:
      hosts:
        msa2-server:
          ansible_host: 192.168.50.65
          arch: amd64
        msr1:
          ansible_host: 192.168.50.199
          arch: arm64
    loadgen:
      hosts:
        msa2-client:
          ansible_host: 192.168.50.195
          arch: amd64
    cluster:
      children:
        bench_targets:
        loadgen:
